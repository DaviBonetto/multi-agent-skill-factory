name: Agentic Skill Forge Daily Run

on:
  schedule:
    - cron: "0 2 * * *" # Every day at 2 AM
  workflow_dispatch: # Allows manual trigger from the UI

permissions:
  contents: write

jobs:
  run-forge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Multi-Agent Orchestrator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          # Adjust path dynamically relative to the runner workspace
          SKILLS_DIR: ${{ github.workspace }}/skills
        run: |
          python main.py

      - name: Commit and Push (If Successful)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "/tmp/agentic_skills_run/ready_for_commit" ]; then
            # Copy generated skills back into the repo
            for file in /tmp/agentic_skills_run/ready_for_commit/*.md; do
              skill_folder=$(basename "$file" .md)
              mkdir -p "skills/$skill_folder"
              cp "$file" "skills/$skill_folder/SKILL.md"
            done

            # Setup Git Identity
            git config --global user.name "Davi Bonetto"
            git config --global user.email "davi.bonetto100@gmail.com"
            
            # Adjust remote
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

            # Iterate through each skill folder generated and commit individually
            for file in /tmp/agentic_skills_run/ready_for_commit/*.md; do
              skill_folder=$(basename "$file" .md)
              
              git add "skills/$skill_folder/SKILL.md"
              
              # Only commit if there are changes for this specific skill
              if ! git diff-index --quiet HEAD; then
                git commit -m "feat(skills): add $skill_folder skill"
              fi
            done
            
            # Push all commits at once
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          else
            echo "No skills were generated to commit."
          fi
